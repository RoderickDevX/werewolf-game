<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RoderickDev</title>
    <link rel="stylesheet" href="/static/home.css" />
  </head>
  <body>
    <main class="hub-shell">
      <header class="hub-header">
        <p class="hub-kicker">RoderickDev</p>
        <h1>游戏作品大厅</h1>
        <p class="hub-intro">这里会整理我制作和部署的网页游戏。每个游戏使用独立子域名，方便更新、维护和继续扩展。</p>
      </header>

      <section class="game-list" aria-label="游戏列表">
        <article class="game-card">
          <div>
            <p class="game-status">已上线</p>
            <h2>卡通狼人杀</h2>
            <p>和 AI 玩家一起完成发言、投票与阵营推理。</p>
          </div>
          <a class="game-link" href="https://werewolf.roderickdev.cn">进入游戏</a>
        </article>

        <article class="game-card muted">
          <div>
            <p class="game-status">规划中</p>
            <h2>下一个游戏</h2>
            <p>新的作品会放在独立子域名，更新后会在这里出现。</p>
          </div>
          <span class="game-link disabled">敬请期待</span>
        </article>
      </section>
    </main>
  </body>
</html>
